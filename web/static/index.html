<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Live Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    header {
      background: #111;
      border-bottom: 2px solid #fe2c55;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.2rem; color: #fe2c55; }
    #connect-form { display: flex; gap: 8px; flex: 1; }
    #username-input {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.95rem;
      flex: 1;
      max-width: 280px;
    }
    #connect-btn {
      background: #fe2c55;
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    #connect-btn:hover { background: #e0253e; }
    #status-bar {
      background: #161616;
      padding: 8px 24px;
      font-size: 0.8rem;
      color: #888;
      border-bottom: 1px solid #222;
    }
    #status-bar span { color: #4caf50; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 90px);
    }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .card-header {
      padding: 10px 14px;
      background: #161616;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
      font-weight: 600;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .card-body::-webkit-scrollbar { width: 4px; }
    .card-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Stats row */
    .stats-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 12px;
    }
    .stat-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      text-align: center;
    }
    .stat-card .val {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fe2c55;
    }
    .stat-card .lbl {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }

    /* Comment feed */
    .comment-item {
      display: flex;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.85rem;
    }
    .comment-item img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .comment-item .uname { color: #fe2c55; font-weight: 600; }
    .comment-item .text { color: #ccc; }

    /* Gift feed */
    .gift-item {
      background: #1a0a0f;
      border: 1px solid #3a1020;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
    }
    .gift-item img {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .gift-item .gift-user { color: #fe2c55; font-weight: 600; }
    .gift-item .gift-name { color: #ffd700; }
    .gift-item .gift-count { color: #aaa; font-size: 0.78rem; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }

    /* Ranking */
    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.85rem;
    }
    .rank-pos {
      width: 22px;
      text-align: center;
      font-weight: 700;
      color: #666;
    }
    .rank-pos.top1 { color: #ffd700; }
    .rank-pos.top2 { color: #c0c0c0; }
    .rank-pos.top3 { color: #cd7f32; }
    .rank-item img { width: 28px; height: 28px; border-radius: 50%; }
    .rank-item .rname { flex: 1; color: #ddd; }
    .rank-item .rcount { color: #fe2c55; font-weight: 700; }

    /* Event feed */
    .event-item {
      padding: 5px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.8rem;
      color: #888;
    }
    .event-item .ev-user { color: #4db6ff; }
    .event-type { font-size: 0.7rem; background: #222; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🎵 TikTok Live Monitor</h1>
  <div id="connect-form">
    <input id="username-input" type="text" placeholder="@username da live" />
    <button id="connect-btn" onclick="connectLive()">Conectar</button>
  </div>
</header>

<div id="status-bar">Status: <span id="status-text">aguardando conexão...</span></div>

<div class="grid">
  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card"><div class="val" id="stat-viewers">0</div><div class="lbl">👁 Viewers</div></div>
    <div class="stat-card"><div class="val" id="stat-gifts">0</div><div class="lbl">🎁 Gifts</div></div>
    <div class="stat-card"><div class="val" id="stat-comments">0</div><div class="lbl">💬 Comentários</div></div>
    <div class="stat-card"><div class="val" id="stat-follows">0</div><div class="lbl">❤️ Novos Seguidores</div></div>
  </div>

  <!-- Comentários -->
  <div class="card">
    <div class="card-header">💬 Chat ao Vivo</div>
    <div class="card-body" id="comment-feed"></div>
  </div>

  <!-- Gifts -->
  <div class="card">
    <div class="card-header">🎁 Gifts Recebidos</div>
    <div class="card-body" id="gift-feed"></div>
  </div>

  <!-- Ranking -->
  <div class="card">
    <div class="card-header">🏆 TOP Gifters</div>
    <div class="card-body" id="ranking"></div>
  </div>
</div>

<!-- Som de gift -->
<audio id="gift-sound" preload="auto">
  <source src="/static/sounds/gift.mp3" type="audio/mpeg" />
</audio>

<script src="/static/app.js"></script>
</body>
</html>
